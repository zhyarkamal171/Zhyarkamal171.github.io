<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhyar's Live Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2ecc71; --dark: #333; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Admin Header */
        #admin-header { background: var(--dark); color: white; width: 100%; max-width: 1000px; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* Grid and Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        img { width: 100%; height: 220px; object-fit: cover; background: #ddd; }
        .content { padding: 15px; text-align: center; }
        
        /* UI Elements */
        .price { font-size: 1.4rem; color: var(--primary); font-weight: bold; margin: 8px 0; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        
        /* Utility */
        .hidden { display: none !important; }
        .admin-btn { background: #e74c3c; color: white; margin-top: 10px; font-size: 0.8rem; display: none; }
    </style>
</head>
<body id="page-body">

    <div id="admin-header">
        <div class="flex-row">
            <span id="status">Market Live 🟢</span>
            <div id="login-box">
                <input type="password" id="pass" placeholder="Admin Pass">
                <button class="btn" onclick="login()">Login</button>
            </div>
            <div id="admin-controls" class="hidden">
                <button class="btn btn-add" onclick="toggleAdd()">+ Add New Product</button>
                <button class="btn" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div id="add-form" class="hidden" style="margin-top:20px; border-top: 1px solid #555; padding-top:20px;">
            <div class="flex-row">
                <input type="text" id="n-name" placeholder="Name (e.g. Lion)">
                <input type="text" id="n-price" placeholder="Price (e.g. 50$)">
                <input type="text" id="n-img" placeholder="Image URL">
                <input type="text" id="n-note" placeholder="Note/Description">
                <button class="btn btn-add" onclick="addProduct()">Save to Cloud</button>
            </div>
        </div>
    </div>

    <div class="grid" id="market-grid">
        <p id="loading-msg">Connecting to Database...</p>
    </div>

    <script>
        // 1. INTEGRATED KEYS
        const SB_URL = 'https://ebikjltcedkzaduuwixm.supabase.co'; 
        const SB_KEY = 'sb_publishable_wKV5wS-UdPucrYtT4D2sQQ_t7lbKiaq'; 

        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. FETCH DATA
        async function fetchAnimals() {
            try {
                const { data, error } = await sb.from('animals').select('*');
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    document.getElementById('market-grid').innerHTML = "The market is empty. Login to add items!";
                } else {
                    render(data);
                }
            } catch (err) {
                document.getElementById('market-grid').innerHTML = "Database Error: " + err.message;
            }
        }

        function render(items) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
                    <div class="content">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price}</div>
                        <p>${p.note}</p>
                        <button class="btn admin-btn" onclick="deleteItem(${p.id})">Delete Item</button>
                    </div>
                </div>
            `).join('');
        }

        // 3. ADMIN FUNCTIONS
        function login() {
            if(document.getElementById('pass').value === "zhyar123") {
                document.getElementById('page-body').classList.add('admin-active');
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('status').innerText = "Admin Mode: Online 🔓";
                document.querySelectorAll('.admin-btn').forEach(b => b.style.display = 'inline-block');
            } else { alert("Wrong password!"); }
        }

        function toggleAdd() { document.getElementById('add-form').classList.toggle('hidden'); }

        async function addProduct() {
            const name = document.getElementById('n-name').value;
            const price = document.getElementById('n-price').value;
            const img = document.getElementById('n-img').value;
            const note = document.getElementById('n-note').value;

            if(!name || !price) return alert("Please fill name and price");

            const { error } = await sb.from('animals').insert([{ name, price, img, note }]);
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Delete this animal from the market?")) {
                await sb.from('animals').delete().eq('id', id);
                location.reload();
            }
        }

        fetchAnimals();
    </script>
</body>
</html>
