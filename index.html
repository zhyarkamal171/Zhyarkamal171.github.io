<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhyar's Market | Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --primary: #22d3ee; --success: #4ade80; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #admin-header { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 1100px; padding: 20px; border-radius: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; padding-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.05); }
        img { width: 100%; height: 250px; object-fit: cover; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .hidden { display: none !important; }
        .admin-only { display: none; }
        .admin-active .admin-only { display: inline-block !important; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body id="page-body">

    <h1>Zhyar's Marketplace</h1>

    <div id="admin-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color: var(--primary); font-weight:bold;">LIVE CATALOG 🟢</span>
            <div id="login-box">
                <input type="password" id="pass" placeholder="Pass">
                <button class="btn btn-primary" onclick="login()">Login</button>
            </div>
            <div id="admin-controls" class="hidden">
                <button class="btn btn-primary" onclick="document.getElementById('add-form').classList.toggle('hidden')">+ Add Product</button>
                <button class="btn" style="background:transparent; color:white;" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div id="add-form" class="hidden" style="margin-top:20px; border-top:1px solid #444; padding-top:20px;">
            <input type="text" id="n-name" placeholder="Name">
            <input type="text" id="n-price" placeholder="Price">
            <input type="text" id="n-note" placeholder="Note">
            <input type="file" id="n-file" accept="image/*">
            <button class="btn btn-primary" id="save-btn" onclick="addProduct()">Upload & Save</button>
        </div>
    </div>

    <div class="grid" id="market-grid">Loading items...</div>

    <script>
        // Integrated Keys
        const SB_URL = 'https://ebikjltcedkzaduuwixm.supabase.co'; 
        const SB_KEY = 'sb_publishable_wKV5wS-UdPucrYtT4D2sQQ_t7lbKiaq'; 
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function fetchItems() {
            const { data, error } = await sb.from('animals').select('*');
            if (data) render(data);
        }

        function render(items) {
            document.getElementById('market-grid').innerHTML = items.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <div style="padding:20px;">
                        <h3>${p.name}</h3>
                        <div style="color:var(--success); font-weight:bold;">${p.price}</div>
                        <p>${p.note || ''}</p>
                        <button class="btn admin-only" style="background:#e74c3c; color:white;" onclick="deleteItem(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function login() {
            if(document.getElementById('pass').value === "zhyar123") {
                document.body.classList.add('admin-active');
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
            }
        }

        async function addProduct() {
            const file = document.getElementById('n-file').files[0];
            const btn = document.getElementById('save-btn');
            if(!file) return alert("Select an image!");
            
            btn.innerText = "Saving...";
            
            try {
                // 1. Storage Upload
                const fName = Date.now() + "_" + file.name;
                await sb.storage.from('animal-images').upload(fName, file);
                const { data: urlData } = sb.storage.from('animal-images').getPublicUrl(fName);
                
                // 2. Database Insert
                await sb.from('animals').insert([{
                    name: document.getElementById('n-name').value,
                    price: document.getElementById('n-price').value,
                    note: document.getElementById('n-note').value,
                    img: urlData.publicUrl
                }]);
                
                location.reload();
            } catch (e) {
                alert("Check your Supabase Policies! Error: " + e.message);
                btn.innerText = "Upload & Save";
            }
        }

        async function deleteItem(id) {
            await sb.from('animals').delete().eq('id', id);
            location.reload();
        }

        fetchItems();
    </script>
</body>
</html>
