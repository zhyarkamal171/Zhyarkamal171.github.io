<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhyar & Friends</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 30px; color: #1a1a1a; }
        
        /* The Grid Container */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }

        /* Individual Animal Cards */
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        /* Image Styling */
        img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background-color: #eee; }
        
        /* Text Styling */
        .name { font-weight: bold; font-size: 1.2rem; text-transform: capitalize; color: #444; }
    </style>
</head>
<body>

    <h1>Animal Gallery</h1>

    <div class="grid">
        <div class="card">
            <img src="lion.jpg.webp" alt="Lion">
            <div class="name">(barham)</div>
        </div>

        <div class="card">
            <img src="cat.jpg.webp" alt="Cat">
            <div class="name">(zhyar)</div>
        </div>

        <div class="card">
            <img src="donkey.jpg.webp" alt="Donkey">
            <div class="name">(akar)</div>
        </div>

        <div class="card">
            <img src="dog.jpg.webp" alt="Dog">
            <div class="name">(raman)</div>
        </div>
    </div>

</body>
</html>
