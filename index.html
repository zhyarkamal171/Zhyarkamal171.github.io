<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhyar's Premium Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #22d3ee; /* Neon Blue */
            --secondary: #818cf8;
            --accent: #f43f5e; /* Delete Red */
            --success: #4ade80; /* Price Green */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Modern Header */
        #admin-header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .flex-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }

        /* Typography */
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }

        /* Modern Card Design */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }

        .img-container { position: relative; width: 100%; height: 250px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover img { transform: scale(1.1); }

        .content { padding: 24px; }
        .content h3 { margin: 0; font-size: 1.5rem; letter-spacing: -0.025em; }
        
        .price-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border-radius: 99px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .note { color: #94a3b8; margin: 15px 0; line-height: 1.6; }

        /* Modern UI Controls */
        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px var(--primary); }
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); width: 100%; margin-top: 10px; display: none; }
        .btn-danger:hover { background: var(--accent); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body id="page-body">

    <h1>Zhyar's Marketplace</h1>

    <div id="admin-header">
        <div class="flex-row">
            <span id="status" style="color: var(--primary); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Live Catalog</span>
            <div id="login-box">
                <input type="password" id="pass" placeholder="Admin Access">
                <button class="btn btn-primary" onclick="login()">Enter</button>
            </div>
            <div id="admin-controls" class="hidden">
                <button class="btn btn-primary" onclick="toggleAdd()">+ Add Product</button>
                <button class="btn" style="background:transparent; color: #94a3b8;" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div id="add-form" class="hidden" style="margin-top:20px; border-top: 1px solid #475569; padding-top:20px;">
            <div class="flex-row" style="justify-content: center;">
                <input type="text" id="n-name" placeholder="Item Name">
                <input type="text" id="n-price" placeholder="Price (e.g. 50$)">
                <input type="text" id="n-img" placeholder="Image URL">
                <input type="text" id="n-note" placeholder="Note">
                <button class="btn btn-primary" onclick="addProduct()">Upload to Market</button>
            </div>
        </div>
    </div>

    <div class="grid" id="market-grid">
        <p style="color: #94a3b8;">Syncing with cloud database...</p>
    </div>

    <script>
        const SB_URL = 'https://ebikjltcedkzaduuwixm.supabase.co'; 
        const SB_KEY = 'sb_publishable_wKV5wS-UdPucrYtT4D2sQQ_t7lbKiaq'; 

        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function fetchAnimals() {
            try {
                const { data, error } = await sb.from('animals').select('*');
                if (error) throw error;
                if (!data || data.length === 0) {
                    document.getElementById('market-grid').innerHTML = "<p style='color:#94a3b8; grid-column: 1/-1; text-align:center;'>No items found in catalog.</p>";
                } else {
                    render(data);
                }
            } catch (err) {
                document.getElementById('market-grid').innerHTML = "<p style='color:var(--accent);'>Error: " + err.message + "</p>";
            }
        }

        function render(items) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <div class="img-container">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x300/1e293b/f8fafc?text=Animal+Image'">
                    </div>
                    <div class="content">
                        <h3>${p.name}</h3>
                        <div class="price-tag">${p.price}</div>
                        <p class="note">${p.note || 'No description provided.'}</p>
                        <button class="btn btn-danger admin-btn" onclick="deleteItem(${p.id})">Remove Listing</button>
                    </div>
                </div>
            `).join('');
        }

        function login() {
            if(document.getElementById('pass').value === "zhyar123") {
                document.getElementById('page-body').classList.add('admin-active');
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('status').innerText = "Admin Authorized 🔓";
                document.querySelectorAll('.admin-btn').forEach(b => b.style.display = 'block');
            } else { alert("Access Denied"); }
        }

        function toggleAdd() { document.getElementById('add-form').classList.toggle('hidden'); }

        async function addProduct() {
            const name = document.getElementById('n-name').value;
            const price = document.getElementById('n-price').value;
            const img = document.getElementById('n-img').value;
            const note = document.getElementById('n-note').value;

            if(!name || !price) return alert("Required fields missing");

            const { error } = await sb.from('animals').insert([{ name, price, img, note }]);
            if (error) alert(error.message);
            else location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Permanently remove this listing?")) {
                await sb.from('animals').delete().eq('id', id);
                location.reload();
            }
        }

        fetchAnimals();
    </script>
</body>
</html>
