<script>
    // 1. INITIALIZE SUPABASE
    // I have plugged in your Project ID below. 
    // PLEASE PASTE YOUR ANON KEY FROM SUPABASE SETTINGS -> API
    const SB_URL = 'https://ebikjltcedkzaduuwixm.supabase.co'; 
    const SB_KEY = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE'; 

    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 2. FETCH DATA FROM DATABASE
    async function fetchAnimals() {
        try {
            console.log("Connecting to Supabase...");
            const { data, error } = await sb.from('animals').select('*');
            
            if (error) {
                console.error("Supabase Error:", error);
                document.getElementById('market-grid').innerHTML = "Database Error: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('market-grid').innerHTML = "The shop is empty! Login as Admin to add items.";
                return;
            }

            render(data);
        } catch (err) {
            console.error("System Error:", err);
            document.getElementById('market-grid').innerHTML = "Connection Failed. Check your API Key.";
        }
    }

    function render(items) {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = items.map(p => `
            <div class="card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                <div style="padding:15px">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price}</div>
                    <p>${p.note}</p>
                    <button class="edit-ui" style="display:none; background:#e74c3c; color:white; border:none; padding:8px; cursor:pointer; border-radius:5px; margin-top:10px;" onclick="deleteItem(${p.id})">Delete Item</button>
                </div>
            </div>
        `).join('');
    }

    // 3. ADMIN ACTIONS
    function login() {
        if(document.getElementById('pass').value === "zhyar123") {
            document.getElementById('page-body').classList.add('admin-active');
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('admin-controls').classList.remove('hidden');
            
            // Show all delete buttons
            document.querySelectorAll('.edit-ui').forEach(btn => btn.style.display = 'block');
            document.getElementById('status').innerText = "Admin Mode: ONLINE 🔓";
        } else {
            alert("Wrong password!");
        }
    }

    function toggleAdd() { 
        document.getElementById('add-form').classList.toggle('hidden'); 
    }

    async function addProduct() {
        const name = document.getElementById('n-name').value;
        const price = document.getElementById('n-price').value;
        const img = document.getElementById('n-img').value;
        const note = document.getElementById('n-note').value;

        const { error } = await sb.from('animals').insert([{ name, price, img, note }]);
        if (error) {
            alert("Error adding item: " + error.message);
        } else {
            alert("Success!");
            location.reload();
        }
    }

    async function deleteItem(id) {
        if(confirm("Are you sure you want to delete this?")) {
            const { error } = await sb.from('animals').delete().eq('id', id);
            if (error) alert("Delete failed: " + error.message);
            else location.reload();
        }
    }

    fetchAnimals();
</script>
