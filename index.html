<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qa7bae Haraje</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .price { font-weight: bold; color: #2ecc71; font-size: 1.4rem; margin: 10px 0; }
        .note { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>Zhyar's Live Marketplace</h1>
    <p>Updating live from Google Sheets!</p>

    <div class="grid" id="market-grid">
        <p>Loading animals...</p>
    </div>

    <script>
        // PASTE YOUR PUBLISHED CSV LINK BELOW
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcTL-96ST5wFBOuGnxZW8JrVV5f9CioEwRQUM41aShAn9Dj0IYoIJlebtrm26tLeIWPtn9NSWT-KaQ/pub?gid=0&single=true&output=csv';

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                
                // Parse CSV rows
                const rows = data.split('\n').slice(1); // Skip the header row
                const grid = document.getElementById('market-grid');
                grid.innerHTML = ''; // Clear loading text

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length < 2) return; // Skip empty rows

                    const [name, price, image, note] = columns;

                    const card = `
                        <div class="card">
                            <img src="${image.trim()}" alt="${name}">
                            <h3>${name}</h3>
                            <div class="price">${price}</div>
                            <div class="note">${note}</div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                console.error("Error loading sheet:", error);
                document.getElementById('market-grid').innerHTML = "Failed to load data. Check your Sheet link!";
            }
        }

        loadData();
    </script>
</body>
</html>
