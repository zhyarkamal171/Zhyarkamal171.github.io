<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhyar's Premium Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --primary: #22d3ee; --success: #4ade80; --accent: #f43f5e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #admin-header { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 1100px; padding: 20px; border-radius: 20px; margin-bottom: 30px; position: sticky; top: 20px; z-index: 100; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        img { width: 100%; height: 250px; object-fit: cover; background: #334155; }
        .content { padding: 20px; }
        .price { color: var(--success); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .btn-save { background: var(--success); color: #000; display: none; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; margin: 5px; width: 90%; }
        .hidden { display: none !important; }
        
        /* Admin View Logic */
        .admin-controls-row { display: none; gap: 10px; margin-top: 15px; }
        .admin-active .admin-controls-row { display: flex; }
        
        /* Edit Mode Styles */
        .edit-fields { display: none; }
        .editing .view-fields { display: none; }
        .editing .edit-fields { display: block; }
        .editing .btn-edit { display: none; }
        .editing .btn-save { display: inline-block; }
    </style>
</head>
<body id="page-body">

    <h1>Zhyar's Marketplace</h1>

    <div id="admin-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color: var(--primary); font-weight:bold;">MARKET STATUS: LIVE 🟢</span>
            <div id="login-section">
                <input type="password" id="admin-pass" placeholder="Password" style="width: 120px;">
                <button class="btn btn-primary" onclick="handleLogin()">Admin Login</button>
            </div>
            <div id="logged-in-tools" class="hidden">
                <button class="btn btn-primary" onclick="document.getElementById('add-panel').classList.toggle('hidden')">+ New Product</button>
                <button class="btn" style="background:transparent; color:#64748b;" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div id="add-panel" class="hidden" style="margin-top:20px; padding-top:20px; border-top:1px solid #334155;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="new-name" placeholder="Animal Name">
                <input type="text" id="new-price" placeholder="Price (e.g. 500$)">
                <input type="text" id="new-note" placeholder="Short Description">
                <input type="file" id="new-image" accept="image/*">
            </div>
            <button class="btn btn-primary" id="upload-btn" style="width:100%; margin-top:15px;" onclick="uploadProduct()">Save to Marketplace</button>
        </div>
    </div>

    <div class="grid" id="item-grid">Loading items...</div>

    <script>
        const SB_URL = 'https://ebikjltcedkzaduuwixm.supabase.co'; 
        const SB_KEY = 'sb_publishable_wKV5wS-UdPucrYtT4D2sQQ_t7lbKiaq'; 
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function loadMarketplace() {
            const { data, error } = await sb.from('animals').select('*').order('id', { ascending: false });
            if (data) displayItems(data);
        }

        function displayItems(items) {
            document.getElementById('item-grid').innerHTML = items.map(item => `
                <div class="card" id="item-${item.id}">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x250/1e293b/f8fafc?text=Image+Blocked+by+Policy'">
                    <div class="content">
                        <div class="view-fields">
                            <h3 id="display-name-${item.id}">${item.name}</h3>
                            <div class="price" id="display-price-${item.id}">${item.price}</div>
                            <p style="color:#94a3b8" id="display-note-${item.id}">${item.note || ''}</p>
                        </div>
                        
                        <div class="edit-fields">
                            <input type="text" id="edit-name-${item.id}" value="${item.name}">
                            <input type="text" id="edit-price-${item.id}" value="${item.price}">
                            <input type="text" id="edit-note-${item.id}" value="${item.note || ''}">
                        </div>

                        <div class="admin-controls-row">
                            <button class="btn btn-primary btn-edit" onclick="startEdit(${item.id})">Edit</button>
                            <button class="btn btn-save" onclick="finishEdit(${item.id})">Save Changes</button>
                            <button class="btn btn-danger" onclick="removeItem(${item.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleLogin() {
            if(document.getElementById('admin-pass').value === "zhyar123") {
                document.getElementById('page-body').classList.add('admin-active');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('logged-in-tools').classList.remove('hidden');
            } else { alert("Incorrect Password"); }
        }

        function startEdit(id) { document.getElementById(`item-${id}`).classList.add('editing'); }

        async function finishEdit(id) {
            const updatedData = {
                name: document.getElementById(`edit-name-${id}`).value,
                price: document.getElementById(`edit-price-${id}`).value,
                note: document.getElementById(`edit-note-${id}`).value
            };

            const { error } = await sb.from('animals').update(updatedData).eq('id', id);
            if (!error) {
                document.getElementById(`display-name-${id}`).innerText = updatedData.name;
                document.getElementById(`display-price-${id}`).innerText = updatedData.price;
                document.getElementById(`display-note-${id}`).innerText = updatedData.note;
                document.getElementById(`item-${id}`).classList.remove('editing');
            } else { alert("Update failed: " + error.message); }
        }

        async function uploadProduct() {
            const btn = document.getElementById('upload-btn');
            const file = document.getElementById('new-image').files[0];
            const name = document.getElementById('new-name').value;
            
            if (!file || !name) return alert("Missing image or name!");
            btn.innerText = "Processing..."; btn.disabled = true;
            
            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { error: upErr } = await sb.storage.from('animal-images').upload(fileName, file);
                if (upErr) throw upErr;

                const { data: urlData } = sb.storage.from('animal-images').getPublicUrl(fileName);
                
                const { error: dbErr } = await sb.from('animals').insert([{
                    name: name,
                    price: document.getElementById('new-price').value,
                    note: document.getElementById('new-note').value,
                    img: urlData.publicUrl
                }]);
                if (dbErr) throw dbErr;

                // Success: Update UI without refreshing
                document.getElementById('add-panel').classList.add('hidden');
                loadMarketplace(); 
            } catch (err) {
                alert("Critical Error: " + err.message);
            } finally {
                btn.innerText = "Save to Marketplace"; btn.disabled = false;
            }
        }

        async function removeItem(id) {
            if(confirm("Permanently delete this item?")) {
                const { error } = await sb.from('animals').delete().eq('id', id);
                if(!error) loadMarketplace();
            }
        }

        loadMarketplace();
    </script>
</body>
</html>
